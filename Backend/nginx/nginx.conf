worker_processes 1;

events {
    worker_connections 1024;
}

http {

    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        client_max_body_size 50M;

        # COMMON HEADERS
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # COOKIE FIX
        proxy_cookie_path / "/; HttpOnly; Secure; SameSite=None";

        # BACKEND SERVICES (use Render URLs, HTTPS)
        location /users/api/ {
            proxy_pass https://auth-service-06sf.onrender.com/users/api/;
        }

        location /doctor/api/ {
            proxy_pass https://doctor-service-1vnw.onrender.com/doctor/api/;
        }

        location /patient/api/ {
            proxy_pass https://patient-service-hkth.onrender.com/patient/api/;
        }

        location /appointment/api/ {
            proxy_pass https://appointment-service-2ja8.onrender.com/appointment/api/;
        }

        location /media/api/ {
            proxy_pass https://telemed-kvg8.onrender.com/media/api/;
        }

        location /payment/api/ {
            proxy_pass https://payment-service-phn5.onrender.com/payment/api/;
        }

        # FRONTEND: serve React SPA
        root /usr/share/nginx/html;   # build directory path
        index index.html index.htm;

        location / {
            try_files $uri /index.html;
        }

        # WEBSOCKET
        location /ws/ {
            proxy_pass https://telemed-kvg8.onrender.com/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}