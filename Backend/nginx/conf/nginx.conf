worker_processes 1;

events {
    worker_connections 1024;
}

http {

    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        client_max_body_size 50M;

        # HEADERS
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cookie_path / "/; HttpOnly; Secure; SameSite=None";

        # AUTH
        location /users/api/ {
            proxy_pass http://auth-service-06sf:8000;
        }

        # DOCTOR
        location /doctor/api/ {
            proxy_pass http://doctor-service-1vnw:8001;
        }

        # PATIENT
        location /patient/api/ {
            proxy_pass http://patient-service-hkth:8002;
        }

        # APPOINTMENT
        location /appointment/api/ {
            proxy_pass http://appointment-service-2ja8:8003;
        }

        # MEDIA
        location /media/api/ {
            proxy_pass http://telemed-kvg8:8004;
        }

        # PAYMENT
        location /payment/api/ {
            proxy_pass http://payment-service-phn5:8005;
        }

        # ❌ REMOVE FRONTEND (since using static site)
        # location / {
        #     proxy_pass http://telemed-118u:3000;
        # }

        # WEBSOCKET
        location /ws/ {
            proxy_pass http://telemed-kvg8:8004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}