server {
    listen 80;
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    resolver 8.8.8.8 8.8.4.4 valid=30s;

    location / {
        try_files $uri /index.html;
    }

    location /users/api/ {
        proxy_pass https://auth-service-06sf.onrender.com/users/api/;
        proxy_set_header Host auth-service-06sf.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /doctor/api/ {
        proxy_pass https://doctor-service-1vnw.onrender.com/doctor/api/;
        proxy_set_header Host doctor-service-1vnw.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /patient/api/ {
        proxy_pass https://patient-service-hkth.onrender.com/patient/api/;
        proxy_set_header Host patient-service-hkth.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /appointment/api/ {
        proxy_pass https://appointment-service-2ja8.onrender.com/appointment/api/;
        proxy_set_header Host appointment-service-2ja8.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /media/api/ {
        proxy_pass https://telemed-kvg8.onrender.com/media/api/;
        proxy_set_header Host telemed-kvg8.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /payment/api/ {
        proxy_pass https://payment-service-phn5.onrender.com/payment/api/;
        proxy_set_header Host payment-service-phn5.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
https://telemed-kvg8.onrender.com/videocall/ping

    location /ws/ {
        proxy_pass https://telemed-kvg8.onrender.com/ws/;
        proxy_set_header Host telemed-kvg8.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_read_timeout 86400;
    }
    location /media/ {
    proxy_pass https://doctor-service-1vnw.onrender.com/media/;
    proxy_set_header Host doctor-service-1vnw.onrender.com;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
}
}